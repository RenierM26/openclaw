name: Build and Publish OpenClaw Gateway Power Image

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"
  push:
    branches:
      - main
    paths:
      - Dockerfile.gateway-power
      - .github/workflows/build-gateway-power.yml
  pull_request:
    paths:
      - Dockerfile.gateway-power
      - .github/workflows/build-gateway-power.yml

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set image variables
        run: |
          echo "IMAGE_NAME=ghcr.io/renierm26/openclaw-gateway-power" >> $GITHUB_ENV
          echo "DATE_TAG=$(date +'%Y.%m.%d')-${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: renierm26
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (PR validation only)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.gateway-power
          platforms: linux/amd64
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.gateway-power
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/renierm26/openclaw-gateway-power:latest
            ghcr.io/renierm26/openclaw-gateway-power:${{ env.DATE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max